<svg width="452" height="400" xmlns="http://www.w3.org/2000/svg"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect width="452" height="400" fill="#F2FAFF" rx="8"/>

  <defs>
    <marker id="arr-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#006DDD"/>
    </marker>
  </defs>

  <text x="222" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#030710">Summarization</text>
  <text x="222" y="46" text-anchor="middle" font-size="11" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">acts on content already in the context window</text>

  <text x="88"  y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Before</text>
  <text x="356" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">After</text>

  <!-- BEFORE context window -->
  <rect x="16" y="80" width="144" height="294" rx="6" fill="#FFFFFF" stroke="#CCE9FF" stroke-width="1.5"/>
  <text x="88" y="98" text-anchor="middle" font-size="9" fill="#40668D" letter-spacing="0.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">CONTEXT WINDOW</text>

  <rect x="26" y="104" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="34" y="113" width="82"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="34" y="121" width="56"  height="3"  rx="1" fill="#B2DEFF"/>

  <rect x="26" y="134" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="34" y="143" width="70"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="34" y="151" width="50"  height="3"  rx="1" fill="#B2DEFF"/>

  <rect x="26" y="164" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="34" y="173" width="90"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="34" y="181" width="62"  height="3"  rx="1" fill="#B2DEFF"/>

  <text x="88" y="204" text-anchor="middle" font-size="9" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">keep cutoff</text>
  <line x1="16" y1="211" x2="160" y2="211" stroke="#40668D" stroke-width="1.5" stroke-dasharray="5,3"/>

  <rect x="26" y="218" width="124" height="26" rx="3" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
  <rect x="34" y="227" width="78"  height="3"  rx="1" fill="#2F4B68"/>
  <rect x="34" y="235" width="54"  height="3"  rx="1" fill="#2F4B68"/>

  <rect x="26" y="248" width="124" height="26" rx="3" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
  <rect x="34" y="257" width="86"  height="3"  rx="1" fill="#2F4B68"/>
  <rect x="34" y="265" width="58"  height="3"  rx="1" fill="#2F4B68"/>

  <rect x="26" y="278" width="124" height="26" rx="3" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
  <rect x="34" y="287" width="72"  height="3"  rx="1" fill="#2F4B68"/>
  <rect x="34" y="295" width="50"  height="3"  rx="1" fill="#2F4B68"/>

  <rect x="26" y="308" width="124" height="26" rx="3" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
  <rect x="34" y="318" width="80"  height="3"  rx="1" fill="#2F4B68"/>

  <!-- Arrows: Before → middleware → After -->
  <line x1="160" y1="218" x2="169" y2="218" stroke="#006DDD" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="279" y1="218" x2="288" y2="218" stroke="#006DDD" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Middleware box -->
  <rect x="172" y="192" width="106" height="52" rx="4" fill="#006DDD"/>
  <text x="225" y="214" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">Summarization</text>
  <line x1="180" y1="221" x2="270" y2="221" stroke="#99D3FF" stroke-width="1"/>
  <text x="225" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">Middleware</text>

  <!-- AFTER context window -->
  <rect x="292" y="80" width="144" height="294" rx="6" fill="#FFFFFF" stroke="#CCE9FF" stroke-width="1.5"/>
  <text x="364" y="98" text-anchor="middle" font-size="9" fill="#40668D" letter-spacing="0.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">CONTEXT WINDOW</text>

  <rect x="302" y="104" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="310" y="113" width="82"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="310" y="121" width="56"  height="3"  rx="1" fill="#B2DEFF"/>

  <rect x="302" y="134" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="310" y="143" width="70"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="310" y="151" width="50"  height="3"  rx="1" fill="#B2DEFF"/>

  <rect x="302" y="164" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="310" y="173" width="90"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="310" y="181" width="62"  height="3"  rx="1" fill="#B2DEFF"/>

  <text x="364" y="204" text-anchor="middle" font-size="9" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">keep cutoff</text>
  <line x1="292" y1="211" x2="436" y2="211" stroke="#40668D" stroke-width="1.5" stroke-dasharray="5,3"/>

  <rect x="302" y="218" width="124" height="30" rx="4" fill="#CCE9FF" stroke="#006DDD" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="364" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#006DDD">&#x2211; Summary</text>

</svg>
