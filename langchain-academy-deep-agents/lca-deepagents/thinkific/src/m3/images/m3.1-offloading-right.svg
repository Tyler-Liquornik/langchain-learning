<svg width="488" height="432" xmlns="http://www.w3.org/2000/svg"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect width="488" height="432" fill="#F2FAFF" rx="8"/>

  <defs>
    <marker id="arr-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#006DDD"/>
    </marker>
    <marker id="arr-mid" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#40668D"/>
    </marker>
  </defs>

  <!-- All x coords = original - 452 -->

  <text x="244" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#030710">Offloading</text>
  <text x="244" y="46" text-anchor="middle" font-size="11" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">intercepts inputs before they enter context</text>

  <!-- Input 1: Tool Result -->
  <rect x="40" y="96" width="100" height="44" rx="4" fill="#E5F4FF" stroke="#40668D" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="90" y="115" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Tool Result</text>
  <text x="90" y="131" text-anchor="middle" font-size="12" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">(large)</text>

  <!-- Input 2: Human Message -->
  <rect x="40" y="160" width="100" height="44" rx="4" fill="#E5F4FF" stroke="#40668D" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="90" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Human</text>
  <text x="90" y="194" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Message</text>

  <!-- Arrows: inputs → middleware -->
  <line x1="140" y1="118" x2="150" y2="138" stroke="#40668D" stroke-width="1.5" marker-end="url(#arr-mid)"/>
  <line x1="140" y1="182" x2="150" y2="172" stroke="#40668D" stroke-width="1.5" marker-end="url(#arr-mid)"/>

  <!-- Filesystem Middleware box -->
  <rect x="154" y="122" width="110" height="52" rx="4" fill="#006DDD"/>
  <text x="209" y="144" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">Filesystem</text>
  <line x1="162" y1="151" x2="256" y2="151" stroke="#99D3FF" stroke-width="1"/>
  <text x="209" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">Middleware</text>

  <!-- Arrow: middleware → context window -->
  <line x1="264" y1="148" x2="282" y2="148" stroke="#006DDD" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Context Window -->
  <rect x="286" y="96" width="184" height="124" rx="5" fill="#FFFFFF" stroke="#CCE9FF" stroke-width="1.5"/>
  <text x="378" y="113" text-anchor="middle" font-size="9" fill="#40668D" letter-spacing="0.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">CONTEXT WINDOW</text>
  <!-- Preview block -->
  <rect x="296" y="119" width="164" height="75" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <text x="378" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Preview</text>
  <line x1="304" y1="142" x2="452" y2="142" stroke="#CCE9FF" stroke-width="1"/>
  <text x="378" y="156" text-anchor="middle" font-size="12" fill="#030710">row 1 | Alice...</text>
  <text x="378" y="170" text-anchor="middle" font-size="12" fill="#40668D">...</text>
  <text x="378" y="185" text-anchor="middle" font-size="12" fill="#006DDD"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">&#x2192; /path/…</text>

  <!-- Arrow: middleware → filesystem (downward) -->
  <line x1="209" y1="174" x2="209" y2="216" stroke="#40668D" stroke-width="1.5" marker-end="url(#arr-mid)"/>

  <!-- Filesystem box -->
  <rect x="145" y="220" width="128" height="138" rx="4" fill="#FFFFFF" stroke="#40668D" stroke-width="1.5"/>
  <text x="209" y="242" text-anchor="middle" font-size="12" fill="#40668D" letter-spacing="0.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">FILESYSTEM</text>
  <line x1="153" y1="250" x2="265" y2="250" stroke="#E5F4FF" stroke-width="1"/>
  <text x="209" y="272" text-anchor="middle" font-size="12" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">/tool_results/</text>
  <text x="209" y="292" text-anchor="middle" font-size="12" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">/conv_history/</text>
  <text x="209" y="314" text-anchor="middle" font-size="12" fill="#030710">full · lossless</text>
  <text x="209" y="334" text-anchor="middle" font-size="12" fill="#6E8900">read_file to retrieve</text>

</svg>
